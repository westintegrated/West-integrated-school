<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | West Integrated School</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ==========================================
         HEADER
    =========================================== -->

    <header class="header">

        <nav class="navbar">

            <a href="index.html" class="logo">

    <img src="images/logo.png" alt="West Integrated School Logo">

    <span>WIS Admin Panel</span>

</a>

<button
id="logout-btn"
class="btn">

    Logout

</button>
        </nav>

    </header>

    <!-- ==========================================
         LOGIN SCREEN
    =========================================== -->

    <section id="login-screen" class="login-page">

        <div class="login-card">

            <span class="section-tag">

                Administrator Portal

            </span>

            <h1>

                Sign In

            </h1>

            <p>

                Authorized personnel only.

            </p>

            <input
type="email"
id="username"
placeholder="Email Address">

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button
            id="login-btn"
            class="btn">

                Sign In

            </button>

            <p id="login-message"></p>

        </div>

    </section>

    <!-- ==========================================
         ADMIN DASHBOARD
    =========================================== -->

    <main id="admin-dashboard" style="display:none;">

        <section class="admin-dashboard">

            <div class="container">

                <span class="section-tag">

                    Administrator

                </span>

                <h1>

                    West Integrated School Dashboard

                </h1>

                <p>

                    Manage announcements and website content.

                </p>

                <div class="admin-grid">

                    <!-- Announcement Editor -->

                    <div class="admin-card">

                        <h2>

                            📢 Announcement Editor

                        </h2>

                        <input
                        type="text"
                        id="announcement-title-input"
                        placeholder="Announcement title">

                        <textarea
                        id="announcement-message-input"
                        placeholder="Write announcement here..."></textarea>

                        <button
                        id="publish-btn"
                        class="btn">

                            Publish Announcement

                        </button>

                    </div>

                 <!-- ======================================
     GALLERY MANAGER
====================================== -->

<div class="admin-card">

    <h2>

        🖼 Gallery Manager

    </h2>

    <p>

        Add images to the public gallery.

    </p>

    <input
    type="text"
    id="gallery-url"
    placeholder="Image URL">

    <input
    type="text"
    id="gallery-title"
    placeholder="Image Title">

    <textarea
    id="gallery-description"
    placeholder="Image Description"></textarea>

    <button
    id="gallery-add-btn"
    class="btn">

        Add To Gallery

    </button>

    <p id="gallery-status"></p>

    <hr style="margin:20px 0;">

    <h3>

        Gallery Items

    </h3>

    <div id="gallery-list">

        <!-- Gallery items will appear here -->

    </div>

</div>

    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->

    
    <script type="module" src="js/admin.js"></script>
</body>

</html>
